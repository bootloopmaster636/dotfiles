#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

autogenerated = 0 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=name,resolution,position,scale
monitor=eDP-1,preferred,auto,0.88
#monitor=,preffered,auto,1,mirror,eDP-1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = hyprpaper
exec-once = eww open bar
exec-once = dunst
exec-once = playerctld daemon
exec-once = easyeffects --gapplication-service
exec-once = udiskie &
exec-once = clight
exec-once = rofi-polkit-agent
exec-once = wlsunset -l -7.5 -L 110.8
# exec-once = libinput-gestures -c /home/chto/.config/libinput-gestures.conf 

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    accel_profile = flat
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0.4 # -1.0 - 1.0, 0 means false modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    blur = true
    blur_size = 8
    blur_passes = 3
    blur_new_optimizations = on
    blur_ignore_opacity = on

    
    active_opacity = 1.0
    inactive_opacity = 0.7
    drop_shadow = false
    shadow_range = 8
    shadow_render_power = 1
    col.shadow = rgba(1a1a1aaf)

    dim_inactive = true
    dim_strength = 0.2
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    # bezier = myBezier,0.15,0.94,0.15,0.99
    bezier = myBezier, 0,1,.6,1
    # bezier = workspc,0.32,0.72,0.28,0.98
    bezier = workspc,.48,.29,.24,1

    animation = windows, 1, 5, myBezier, slide
    animation = fade, 1, 4, default
    animation = border, 1, 10, default
    animation = workspaces, 1, 4, workspc, slidevert
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true
    workspace_swipe_fingers = 4
    workspace_swipe_distance = 500
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_forever = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic mouse V1 {
#     sensitivity = -0.5
# }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# App binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive
bind = $mainMod, L, exit
bind = $mainMod, E, exec, kitty -e nnn
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, X, togglefloating
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, J, togglesplit # dwindle
bind = $mainMod SHIFT, S, exec, grimblast copy area
bind = $mainMod SHIFT, A, exec, kitty -e btop 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# Multimedia keys
bind = SHIFT, XF86AudioLowerVolume, exec, pw-volume mute toggle
bind = , XF86AudioLowerVolume, exec, pw-volume change -0.5%
bind = , XF86AudioRaiseVolume, exec, pw-volume change +0.5%
bind = , XF86AudioMute, exec, pw-volume mute toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = SHIFT, XF86AudioPrev, exec, playerctl position 5-
bind = SHIFT, XF86AudioNext, exec, playerctl position 5+

# brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +2
bind = , XF86MonBrightnessDown, exec, brightnessctl s 2-

#Window rules
windowrulev2 = opacity 0.8 0.6, class:^(kitty)$